<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome-like Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f1f3f4;
    }

    .toolbar {
      background: #f1f3f4;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #dadce0;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
      margin-right: 12px;
    }

    .nav-button {
      background: white;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
    }

    .nav-button:hover {
      background: #f8f9fa;
    }

    .address-bar-container {
      flex: 1;
      position: relative;
    }

    .address-bar {
      width: 100%;
      padding: 10px 44px 10px 32px;
      border: 1px solid #dfe1e5;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      background: white;
      box-shadow: inset 0 1px 2px 0 rgba(60,64,67,.1);
    }

    .address-bar:focus {
      box-shadow: inset 0 1px 2px 0 rgba(60,64,67,.3);
      border-color: #d2e3fc;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa0a6;
    }

    .refresh-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #9aa0a6;
      cursor: pointer;
    }

    .browser-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .iframe-container {
      flex: 1;
      border: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .status-bar {
      height: 24px;
      background: #f1f3f4;
      border-top: 1px solid #dadce0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      font-size: 12px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="nav-buttons">
      <div class="nav-button" id="back-btn">&#9664;</div>
      <div class="nav-button" id="forward-btn">&#9654;</div>
      <div class="nav-button" id="home-btn">&#9733;</div>
    </div>
    <div class="address-bar-container">
      <span class="search-icon">🔍</span>
      <input type="text" class="address-bar" id="address-bar" placeholder="Search Google or type a URL">
      <span class="refresh-icon" id="refresh-btn">⟳</span>
    </div>
  </div>
  <div class="browser-container">
    <div class="iframe-container">
      <iframe id="browser-frame" src="https://www.google.com"></iframe>
    </div>
  </div>
  <div class="status-bar" id="status-bar">
    Ready
  </div>

  <script>
    // DOM elements
    const addressBar = document.getElementById('address-bar');
    const browserFrame = document.getElementById('browser-frame');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const homeBtn = document.getElementById('home-btn');
    const refreshBtn = document.getElementById('refresh-btn');
    const statusBar = document.getElementById('status-bar');

    // Navigation functions
    function navigateToUrl(url) {
      // Add protocol if missing
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
      }
      
      browserFrame.src = url;
      addressBar.value = url;
      statusBar.textContent = `Loading ${url}...`;
    }

    // Event listeners
    addressBar.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        navigateToUrl(addressBar.value);
      }
    });

    backBtn.addEventListener('click', function() {
      try {
        browserFrame.contentWindow.history.back();
      } catch (e) {
        console.log("Cannot go back due to cross-origin restrictions");
      }
    });

    forwardBtn.addEventListener('click', function() {
      try {
        browserFrame.contentWindow.history.forward();
      } catch (e) {
        console.log("Cannot go forward due to cross-origin restrictions");
      }
    });

    homeBtn.addEventListener('click', function() {
      navigateToUrl('https://www.google.com');
    });

    refreshBtn.addEventListener('click', function() {
      try {
        browserFrame.contentWindow.location.reload();
      } catch (e) {
        browserFrame.src = browserFrame.src; // Alternative reload method
      }
    });

    // Update status when iframe loads
    browserFrame.addEventListener('load', function() {
      try {
        addressBar.value = browserFrame.contentWindow.location.href;
        statusBar.textContent = `Loaded ${browserFrame.contentWindow.location.href}`;
      } catch (e) {
        // Cross-origin restrictions prevent accessing location, which is normal
        statusBar.textContent = 'Secure site loaded';
      }
    });
  </script>
</body>
</html>
